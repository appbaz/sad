name: gitbridge_mobile
description: GitBridge secure chat — Firestore text + Google Drive media via Cloudflare Worker
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  http: ^1.2.2
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  crypto: ^3.0.6
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
