<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Private Chat</title>
  <script>
    sessionStorage.setItem("spa-path", window.location.pathname + window.location.search);
    var parts = window.location.pathname.split("/").filter(Boolean);
    parts.pop();
    var base = "/" + parts.join("/");
    if (!base.endsWith("/")) base += "/";
    window.location.replace(base || "/");
  </script>
</head>
<body></body>
</html>
